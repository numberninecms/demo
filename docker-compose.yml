#
# This file builds a development only.
# For production environment, checkout the branch `production`.
#

version: "3.8"

services:
    nginx:
        container_name: ${APP_NAME:-numbernine}_nginx
        image: nginx:alpine
        ports:
            - ${NGINX_PORT:-443}:443
        environment:
            NGINX_PORT: ${NGINX_PORT:-443}
            SERVER_NAME: ${SERVER_NAME:-localhost}
            PHP_SERVICE: ${PHP_SERVICE:-php}
        restart: always
        working_dir: /srv/app
        volumes:
            - ./docker/nginx/templates:/etc/nginx/templates
            - ./docker/nginx/cert/localhost.crt:/etc/ssl/certs/localhost.crt
            - ./docker/nginx/cert/localhost.key:/etc/ssl/private/localhost.key
            - ./:/srv/app

    php:
        container_name: ${APP_NAME:-numbernine}_php
        image: numberninecms/php:7.4-fpm-dev
        working_dir: /srv/app
        user: '1000:1000'
        restart: always
        env_file:
            - .env
            - .env.local
        environment:
            BLACKFIRE_CLIENT_ID: ~
            BLACKFIRE_CLIENT_TOKEN: ~
            REDIS_HOST: redis
            REDIS_PORT: 6379
        volumes:
            - ./:/srv/app
            - ./docker/php/xdebug.ini:/etc/php7/conf.d/xdebug.ini
            - ./docker/php/blackfire.ini:/etc/php7/conf.d/blackfire.ini
            - ./docker/php/symfony.ini:/etc/php7/conf.d/symfony.ini
            - ../:/srv/app/vendor/numberninecms
        links:
            - blackfire

    mysql:
        container_name: ${APP_NAME:-numbernine}_mysql
        image: mysql:latest
        command: --default-authentication-plugin=mysql_native_password
        restart: always
        ports:
            - 3306:3306
        environment:
            - MYSQL_USER=user
            - MYSQL_PASSWORD=user
            - MYSQL_ROOT_PASSWORD=root
            - MYSQL_DATABASE=numbernine_app
        volumes:
            - mysql_data:/var/lib/mysql

    redis:
        container_name: ${APP_NAME:-numbernine}_redis
        image: redis:alpine
        restart: always
        ports:
            - ${REDIS_PORT:-6379}:6379

    blackfire:
        container_name: ${APP_NAME:-numbernine}_blackfire
        image: blackfire/blackfire
        restart: always
        ports:
            - 8707:8707
        environment:
            BLACKFIRE_CLIENT_ID: ~
            BLACKFIRE_CLIENT_TOKEN: ~
            BLACKFIRE_SERVER_ID: ~
            BLACKFIRE_SERVER_TOKEN: ~

volumes:
    mysql_data:
    app_files:
    app_var:
