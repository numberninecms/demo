version: "3.8"

services:
    php:
        container_name: numbernine_app_php
        build:
            context: .
            dockerfile: docker/Dockerfile
            target: numbernine_app_php
        restart: unless-stopped
        healthcheck:
            interval: 10s
            timeout: 3s
            retries: 3
            start_period: 30s

    caddy:
        container_name: numbernine_app_caddy
        build:
            context: .
            dockerfile: ./docker/caddy/Dockerfile
            target: numbernine_app_caddy
        environment:
            SERVER_NAME: ${SERVER_NAME:-localhost}
        restart: unless-stopped
        ports:
            - "80:80"
            - "443:443"
        depends_on:
            - php
        volumes:
            - caddy_data:/data
            - caddy_config:/config

    mysql:
        image: mysql:latest
        command: --default-authentication-plugin=mysql_native_password
        environment:
            - MYSQL_USER=user
            - MYSQL_PASSWORD=user
            - MYSQL_ROOT_PASSWORD=root
            - MYSQL_DATABASE=numbernine_app
        restart: unless-stopped
        ports:
            - 9906:3306
        volumes:
            - mysql_data:/var/lib/mysql

    phpmyadmin:
        container_name: numbernine_app_phpmyadmin
        image: phpmyadmin/phpmyadmin:latest
        ports:
            - 8100:80
        environment:
            - PMA_HOST=mysql
            - PMA_PORT=3306
            - PMA_USER=root
            - PMA_PASSWORD=root
            - PMA_ARBITRARY=1
        restart: unless-stopped
        links:
            - mysql
        depends_on:
            - mysql

volumes:
    mysql_data:
    caddy_data:
    caddy_config:
