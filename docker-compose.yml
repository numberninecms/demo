version: "3.8"

# Environment variables to add to your server's .env.local file:
#
# APP_SECRET=<randomstring>
# APP_ENV=prod
# APP_NAME=<name_of_your_app_snake_case>
# SERVER_NAME=<your.domain.com>
# MYSQL_USER=<mysql_user>
# MYSQL_PASSWORD=<mysql_password>
# MYSQL_ROOT_PASSWORD=<mysql_root_password>
# MYSQL_DATABASE=<db_name>
# DATABASE_URL=mysql://<mysql_user>:<mysql_password>@mysql:3306/<db_name>?serverVersion=5.7
# REDIS_URL=redis://redis:6379

services:
    app:
        container_name: ${APP_NAME:-numbernine}_app_files
        image: numberninecms/demo-app:latest # Change this with your image name
        env_file:
            - .env.local
        volumes:
            - app_files:/srv/app
            - app_var:/srv/app/var

    nginx:
        container_name: ${APP_NAME:-numbernine}_nginx
        image: nginx:alpine
        ports:
            - ${NGINX_PORT:-443}:443
        environment:
            NGINX_PORT: ${NGINX_PORT:-443}
            SERVER_NAME: ${SERVER_NAME:-localhost}
            PHP_SERVICE: ${PHP_SERVICE:-php}
        restart: always
        working_dir: /srv/app
        env_file:
            - .env.local
        volumes:
            - ./docker/nginx/templates:/etc/nginx/templates
            - app_files:/srv/app
            - app_var:/srv/app/var

    php:
        container_name: ${APP_NAME:-numbernine}_php
        image: numberninecms/php:7.4-fpm
        working_dir: /srv/app
        user: '1000'
        restart: always
        env_file:
            - .env.local
        volumes:
            - ./docker/php/symfony.ini:/usr/local/etc/php/conf.d/symfony.ini
            - app_files:/srv/app
            - app_var:/srv/app/var

    mysql:
        container_name: ${APP_NAME:-numbernine}_mysql
        image: mysql:8
        command: --default-authentication-plugin=mysql_native_password
        restart: always
        env_file:
            - .env.local
        ports:
            - 3306:3306
        volumes:
            - mysql_data:/var/lib/mysql

    redis:
        container_name: ${APP_NAME:-numbernine}_redis
        image: redis:alpine
        restart: always
        env_file:
            - .env.local
        ports:
            - ${REDIS_PORT:-6379}

volumes:
    mysql_data:
    app_files:
    app_var:
