os: linux
dist: bionic
language: php

services:
    - docker

php:
    - 7.4

env:
    - COMPOSER_VERSION=2

cache:
    directories:
        - $HOME/bin
        - $HOME/.composer/cache/files

jobs:
    include:
        -
            stage: test
            install:
                - composer install --no-interaction
            script:
                - ./vendor/bin/grumphp run --no-interaction

        -
            stage: deploy_docker_digitalocean
            if: |
                env(DEPLOY_DOCKER_DIGITALOCEAN) = true AND \
                env(DIGITALOCEAN_REGISTRY) IS present AND \
                env(DIGITALOCEAN_IMAGE) IS present AND \
                env(DIGITALOCEAN_TOKEN) IS present AND \
                branch = master AND \
                type = push
            env:
                - APP_ENV=prod
            before_install:
                - wget https://github.com/digitalocean/doctl/releases/download/v1.50.0/doctl-1.50.0-linux-amd64.tar.gz
                - tar xf $HOME/doctl-1.50.0-linux-amd64.tar.gz
                - mkdir $HOME/bin
                - mv $HOME/doctl $HOME/bin/
                - export PATH=$HOME/bin:$PATH
            install:
                - composer install --prefer-dist --no-dev --no-progress --no-scripts --no-interaction
            before_script:
                - composer dump-autoload --classmap-authoritative --no-dev
                - composer run-script --no-dev post-install-cmd
                - ln -s ./bundles/numbernine/admin ./public/admin
                - echo "APP_SECRET=$(head /dev/urandom | tr -dc A-Za-z0-9 | head -c 50 ; echo '')" >> .env.prod
                - doctl auth init -t $DIGITALOCEAN_TOKEN
                - doctl registry login
            script:
                - docker-compose -f docker-compose.build.yml build numbernine_builder
                - docker tag numberninecms/demo-app:latest registry.digitalocean.com/$DIGITALOCEAN_REGISTRY/$DIGITALOCEAN_IMAGE
                - docker push registry.digitalocean.com/$DIGITALOCEAN_REGISTRY/$DIGITALOCEAN_IMAGE
